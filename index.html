<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>SafePlay by MaternIA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4fb;min-height:100vh}
.app{max-width:420px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:#7F77DD;padding:1.25rem;color:#fff;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:22px;font-weight:700}
.logo small{display:block;font-size:12px;font-weight:400;opacity:.75;margin-top:2px}
.abtn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit}
.tabs{display:flex;border-bottom:1px solid #e8e6f0}
.tab{flex:1;padding:13px;font-size:13px;text-align:center;cursor:pointer;color:#999;border:none;background:#fff;font-family:inherit;border-bottom:2.5px solid transparent}
.tab.on{color:#7F77DD;border-bottom-color:#7F77DD;font-weight:600}
.body{flex:1;padding:1rem;overflow-y:auto}
.card{background:#fff;border:1px solid #e8e6f0;border-radius:12px;padding:1rem;margin-bottom:12px}
.card.on{border-color:#7F77DD;border-width:2px}
.row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ic{width:40px;height:40px;border-radius:10px;background:#EEEDFE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pname{font-size:15px;font-weight:700;color:#1a1a2e}
.psub{font-size:12px;color:#999;margin-top:2px}
.btns{display:flex;gap:6px;margin-left:auto}
.ib{background:none;border:none;cursor:pointer;padding:6px;color:#aaa;border-radius:6px}
.ib:active{background:#f0effe;color:#7F77DD}
.tlist{margin-top:8px;border-top:1px solid #f0effe;padding-top:8px}
.trow{display:flex;align-items:center;gap:8px;padding:5px 0}
.tnum{font-size:11px;color:#bbb;width:18px;text-align:center;flex-shrink:0}
.ttitle{font-size:13px;color:#1a1a2e;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.ttitle.now{color:#7F77DD;font-weight:600}
.tdel{background:none;border:none;cursor:pointer;color:#ddd;font-size:18px;padding:2px 6px;line-height:1}
.actions{display:flex;gap:8px;align-items:center;margin-top:10px}
.pbtn{background:#7F77DD;color:#fff;border:none;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.pbtn.playing{background:#3C3489}
.sbtn{font-size:12px;padding:7px 13px;border:1px solid #e0ddf5;border-radius:20px;background:#fff;color:#534AB7;font-weight:500;cursor:pointer;font-family:inherit}
.sbox{background:#f8f7fe;border-radius:10px;padding:12px;margin-top:10px}
.slbl{font-size:12px;color:#888;margin-bottom:6px}
.scode{width:100%;font-size:11px;padding:8px;border:1px solid #e0ddf5;border-radius:6px;background:#fff;color:#333;font-family:monospace;resize:none}
.scpy{width:100%;margin-top:6px;padding:8px;border-radius:8px;cursor:pointer;font-family:inherit;border:1px solid #e0ddf5;background:#fff;color:#534AB7;font-weight:500;font-size:12px}
.np{background:#EEEDFE;border:2px solid #AFA9EC;border-radius:12px;padding:1rem;margin-bottom:12px}
.nplbl{font-size:11px;font-weight:700;color:#534AB7;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.nptitle{font-size:14px;font-weight:600;color:#3C3489;margin-bottom:12px;line-height:1.4}
.npc{display:flex;align-items:center;gap:8px}
.cb{background:rgba(83,74,183,.12);border:none;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#534AB7;flex-shrink:0}
.cb.main{background:#7F77DD;color:#fff;width:44px;height:44px}
.bar{flex:1;height:4px;background:#ccc8f0;border-radius:2px;overflow:hidden}
.fill{height:100%;background:#534AB7;border-radius:2px;transition:width .8s linear;width:0}
.empty{text-align:center;padding:3rem 1rem;color:#bbb}
.etitle{font-size:15px;font-weight:600;color:#666;margin-bottom:6px}
.esub{font-size:13px;line-height:1.6}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem 1.5rem 2.5rem;width:100%;max-height:85vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:700;margin-bottom:1.25rem;color:#1a1a2e}
.modal label{font-size:13px;color:#666;display:block;margin-bottom:5px;margin-top:14px}
.modal input{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-family:inherit;color:#1a1a2e;-webkit-appearance:none}
.modal input:focus{outline:none;border-color:#7F77DD}
.mbtns{display:flex;gap:10px;margin-top:1.5rem}
.mcancel{flex:1;padding:13px;border:1px solid #ddd;border-radius:10px;background:none;font-family:inherit;cursor:pointer;color:#666;font-size:14px}
.msave{flex:2;padding:13px;background:#7F77DD;color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer}
.iwrap{background:#f8f7fe;border-radius:12px;padding:1.25rem}
.ititle{font-size:15px;font-weight:700;margin-bottom:6px;color:#1a1a2e}
.isub{font-size:13px;color:#888;margin-bottom:14px;line-height:1.6}
.icode{width:100%;padding:10px;border:1px solid #e0ddf5;border-radius:8px;font-family:monospace;font-size:12px;background:#fff;color:#333;resize:none;min-height:80px}
.ibtn{width:100%;margin-top:10px;padding:13px;background:#7F77DD;color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer}
.astep{margin-bottom:20px}
.astitle{font-size:15px;font-weight:700;margin-bottom:6px;color:#1a1a2e;display:flex;align-items:center;gap:8px}
.anum{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:#EEEDFE;color:#534AB7;border-radius:50%;font-size:13px;font-weight:700;flex-shrink:0}
.atext{font-size:13px;color:#666;line-height:1.7;padding-left:34px}
.safebox{background:#EEEDFE;border-radius:12px;padding:14px;margin-top:16px}
.safelbl{font-size:12px;font-weight:700;color:#534AB7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.safetext{font-size:13px;color:#3C3489;line-height:1.6}
.footer{text-align:center;padding:16px;font-size:12px;color:#bbb;border-top:1px solid #f0effe}
.footer a{color:#7F77DD;text-decoration:none;font-weight:600}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#3C3489;color:#fff;padding:11px 22px;border-radius:24px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">SafePlay<small>by MaternIA</small></div>
    <button class="abtn" onclick="openModal('pl')">+ Playlist</button>
  </div>
  <div class="tabs">
    <button class="tab on" id="t-mine" onclick="tab('mine')">As minhas</button>
    <button class="tab" id="t-import" onclick="tab('import')">Importar</button>
    <button class="tab" id="t-about" onclick="tab('about')">Como usar</button>
  </div>
  <div class="body" id="body"></div>
  <div class="footer">SafePlay &bull; by <a href="https://maternIA.pt" target="_blank">MaternIA</a></div>
</div>
<div class="toast" id="toast"></div>
<div style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px"><div id="ytp"></div></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
var S={pls:[],cur:null,idx:0,on:false,yt:null,ytok:false,tmr:null,sopen:{}};
try{var sv=localStorage.getItem('sp3');if(sv)S.pls=JSON.parse(sv);}catch(e){}
if(!S.pls.length){
  S.pls=[
    {id:'x1',name:'Viagem escola',tracks:[{t:'Frozen - Let It Go',u:'https://www.youtube.com/watch?v=L0MK7qz13bU'},{t:'Encanto - Surface Pressure',u:'https://www.youtube.com/watch?v=tBMPASEMJUA'}]},
    {id:'x2',name:'Noite calma',tracks:[{t:'Relaxing Music for Kids',u:'https://www.youtube.com/watch?v=2OEL4P1Rz04'}]}
  ];
  save();
}
function save(){try{localStorage.setItem('sp3',JSON.stringify(S.pls));}catch(e){}}
function uid(){return 'p'+Date.now();}
function getvid(u){try{var x=new URL(u);if(x.hostname.includes('youtu.be'))return x.pathname.slice(1);return x.searchParams.get('v');}catch(e){return null;}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2800);}
window.onYouTubeIframeAPIReady=function(){
  S.ytok=true;
  S.yt=new YT.Player('ytp',{height:'1',width:'1',
    playerVars:{autoplay:1,controls:0,rel:0,playsinline:1},
    events:{onStateChange:function(e){
      if(e.data===1){S.on=true;startP();render();}
      if(e.data===2){S.on=false;stopP();render();}
      if(e.data===0)nextT();
    }}
  });
};
function playT(pid,i){
  var pl=S.pls.find(function(p){return p.id===pid;});
  if(!pl||!pl.tracks[i])return;
  S.cur=pid;S.idx=i;
  var v=getvid(pl.tracks[i].u);
  if(!v){toast('Link YouTube invalido');return;}
  if(S.ytok&&S.yt&&S.yt.loadVideoById){S.yt.loadVideoById(v);S.on=true;}
  else{setTimeout(function(){playT(pid,i);},1500);}
  render();
}
function playPL(pid){S.idx=0;playT(pid,0);}
function nextT(){
  var pl=S.pls.find(function(p){return p.id===S.cur;});
  if(!pl)return;
  if(S.idx+1<pl.tracks.length)playT(S.cur,S.idx+1);
  else{S.on=false;stopP();render();}
}
function prevT(){if(S.idx>0)playT(S.cur,S.idx-1);}
function togPlay(){
  if(!S.yt||!S.cur)return;
  if(S.on)S.yt.pauseVideo();else S.yt.playVideo();
}
function startP(){
  stopP();
  S.tmr=setInterval(function(){
    if(S.yt&&S.yt.getDuration){
      var d=S.yt.getDuration(),c=S.yt.getCurrentTime();
      var p=d>0?Math.round(c/d*100):0;
      var el=document.getElementById('fill');if(el)el.style.width=p+'%';
    }
  },1000);
}
function stopP(){if(S.tmr){clearInterval(S.tmr);S.tmr=null;}}
function genCode(pl){return btoa(unescape(encodeURIComponent(JSON.stringify({n:pl.name,t:pl.tracks}))));}
function importCode(code){
  try{
    var d=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    S.pls.push({id:uid(),name:d.n,tracks:d.t});save();
    toast('Playlist importada!');tab('mine');render();
  }catch(e){toast('Codigo invalido');}
}
function copyCode(pid){
  var pl=S.pls.find(function(p){return p.id===pid;});
  if(!pl)return;
  var c=genCode(pl);
  if(navigator.clipboard)navigator.clipboard.writeText(c).then(function(){toast('Codigo copiado!');});
  else{var ta=document.createElement('textarea');ta.value=c;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Codigo copiado!');}
}
function delPL(pid){
  if(!confirm('Apagar esta playlist?'))return;
  S.pls=S.pls.filter(function(p){return p.id!==pid;});
  if(S.cur===pid){S.cur=null;S.on=false;if(S.yt&&S.yt.stopVideo)S.yt.stopVideo();}
  save();render();
}
function delT(pid,i){
  var pl=S.pls.find(function(p){return p.id===pid;});
  if(pl){pl.tracks.splice(i,1);save();render();}
}
function togShare(pid){S.sopen[pid]=!S.sopen[pid];render();}
var ctab='mine';
function tab(t){
  ctab=t;
  ['mine','import','about'].forEach(function(x){
    var el=document.getElementById('t-'+x);
    if(el)el.className='tab'+(x===t?' on':'');
  });
  render();
}
function render(){
  var b=document.getElementById('body');
  if(ctab==='mine')b.innerHTML=rMine();
  else if(ctab==='import')b.innerHTML=rImport();
  else b.innerHTML=rAbout();
}
function rMine(){
  var h='';
  var pl=S.pls.find(function(p){return p.id===S.cur;});
  if(pl&&S.on){
    var tr=pl.tracks[S.idx];
    h+='<div class="np"><div class="nplbl">A tocar agora</div><div class="nptitle">'+esc(tr.t)+'</div><div class="npc"><button class="cb" onclick="prevT()"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button><button class="cb main" onclick="togPlay()"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button><button class="cb" onclick="nextT()"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6h2v12h-2z"/></svg></button><div class="bar"><div class="fill" id="fill"></div></div></div></div>';
  }
  if(!S.pls.length)return h+'<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="#ddd" style="margin-bottom:12px"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg><div class="etitle">Sem playlists ainda</div><div class="esub">Cria a tua primeira playlist.</div></div>';
  S.pls.forEach(function(p){
    var isOn=p.id===S.cur;
    h+='<div class="card'+(isOn?' on':'')+'"><div class="row"><div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="#7F77DD"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg></div><div><div class="pname">'+esc(p.name)+'</div><div class="psub">'+p.tracks.length+' musica'+(p.tracks.length!==1?'s':'')+'</div></div><div class="btns"><button class="ib" onclick="openModal(\'t\',\''+p.id+'\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button><button class="ib" onclick="delPL(\''+p.id+'\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button></div></div>'+(p.tracks.length?'<div class="tlist">'+p.tracks.map(function(tr,i){var isCur=S.cur===p.id&&S.idx===i;return '<div class="trow"><span class="tnum">'+(isCur&&S.on?'&#9654;':(i+1))+'</span><span class="ttitle'+(isCur?' now':'')+'" onclick="playT(\''+p.id+'\','+i+')">'+esc(tr.t)+'</span><button class="tdel" onclick="delT(\''+p.id+'\','+i+')">&times;</button></div>';}).join('')+'</div>':'')+
    '<div class="actions"><button class="pbtn'+(isOn&&S.on?' playing':'')+'" onclick="playPL(\''+p.id+'\')"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="'+(isOn&&S.on?'M6 19h4V5H6v14zm8-14v14h4V5h-4z':'M8 5v14l11-7z')+'"/></svg>'+(isOn&&S.on?'A tocar':'Iniciar')+'</button><button class="sbtn" onclick="togShare(\''+p.id+'\')">Partilhar</button></div>'+
    (S.sopen[p.id]?'<div class="sbox"><div class="slbl">Codigo para partilhar:</div><textarea class="scode" rows="3" readonly onclick="this.select()">'+genCode(p)+'</textarea><button class="scpy" onclick="copyCode(\''+p.id+'\')">Copiar codigo</button></div>':'')+
    '</div>';
  });
  return h;
}
function rImport(){
  return '<div class="iwrap"><div class="ititle">Importar playlist</div><div class="isub">Cola o codigo que recebeste de outra mae da comunidade MaternIA.</div><textarea id="ic" class="icode" placeholder="Cola o codigo aqui..."></textarea><button class="ibtn" onclick="importCode(document.getElementById(\'ic\').value)">Importar playlist</button></div>';
}
function rAbout(){
  return '<div><div class="astep"><div class="astitle"><span class="anum">1</span>Cria uma playlist</div><div class="atext">Toca em + Playlist, da um nome e adiciona musicas com links do YouTube.</div></div><div class="astep"><div class="astitle"><span class="anum">2</span>Adiciona musicas</div><div class="atext">Precisas do titulo e do link completo do YouTube para cada musica.</div></div><div class="astep"><div class="astitle"><span class="anum">3</span>Toca em Iniciar</div><div class="atext">A musica comeca automaticamente. Sem mais toques. Poe o telemovel de lado.</div></div><div class="astep"><div class="astitle"><span class="anum">4</span>Partilha com outras maes</div><div class="atext">Usa Partilhar para gerar um codigo. A outra mae cola em Importar.</div></div><div class="safebox"><div class="safelbl">Seguranca em primeiro lugar</div><div class="safetext">Carrega Iniciar antes de arrancar. O SafePlay foi feito para que nao precises de tocar no telemovel enquanto conduzes.</div></div></div>';
}
var mtype='',mpid='';
function openModal(type,pid){
  mtype=type;mpid=pid||'';
  var bg=document.createElement('div');bg.className='mbg';bg.id='mbg';
  bg.onclick=function(e){if(e.target===bg)closeModal();};
  var inner=type==='pl'?'<h2>Nova playlist</h2><label>Nome</label><input id="mn" placeholder="Ex: Viagem escola" autocomplete="off"><div class="mbtns"><button class="mcancel" onclick="closeModal()">Cancelar</button><button class="msave" onclick="savePL()">Criar</button></div>':'<h2>Adicionar musica</h2><label>Titulo</label><input id="mt" placeholder="Ex: Frozen - Let It Go" autocomplete="off"><label>Link YouTube</label><input id="mu" type="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off"><div class="mbtns"><button class="mcancel" onclick="closeModal()">Cancelar</button><button class="msave" onclick="saveT()">Adicionar</button></div>';
  bg.innerHTML='<div class="modal">'+inner+'</div>';
  document.body.appendChild(bg);
  setTimeout(function(){var f=bg.querySelector('input');if(f)f.focus();},150);
}
function closeModal(){var o=document.getElementById('mbg');if(o)o.remove();}
function savePL(){
  var n=document.getElementById('mn').value.trim();
  if(!n){toast('Da um nome a playlist');return;}
  S.pls.push({id:uid(),name:n,tracks:[]});save();closeModal();render();
}
function saveT(){
  var t=document.getElementById('mt').value.trim();
  var u=document.getElementById('mu').value.trim();
  if(!t||!u){toast('Preenche o titulo e o link');return;}
  if(!getvid(u)){toast('Link YouTube invalido');return;}
  var pl=S.pls.find(function(p){return p.id===mpid;});
  if(!pl)return;
  pl.tracks.push({t:t,u:u});save();closeModal();render();toast('Musica adicionada!');
}
render();
</script>
</body>
</html>
